<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dotbeat</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #181818;
        color: #eee;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      h1 { font-weight: 600; }
      #status { color: #aaa; font-size: 0.95rem; }
      button {
        background: #333;
        color: #eee;
        border: 1px solid #555;
        border-radius: 6px;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      button:hover { background: #444; }
      #chosen { color: #6cb96c; font-size: 0.85rem; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <h1>dotbeat</h1>
    <div id="status">starting the daemon and beatlab dev server...</div>
    <button id="open-folder">Open Project Folder…</button>
    <div id="chosen"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
